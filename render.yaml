services:
  - type: web
    name: spectrack
    repo: https://github.com/Adityasharma-in/SpecTrack
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: CLERK_DOMAIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
